<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Datos de Encuestas</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    table {
      margin: auto;
      border-collapse: collapse;
      width: 80%;
      margin-top: 30px;
    }

    th, td {
      border: 1px solid white;
      padding: 10px;
    }

    th {
      background: #1e293b;
    }
  </style>
</head>

<body>

<h2>📊 Encuestas Guardadas</h2>

<table id="tablaDatos">
  <thead>
    <tr>
      <th>Inundada</th>
      <th>Damnificado</th>
      <th>Dirección</th>
      <th>Fecha</th>
    </tr>
  </thead>

  <tbody></tbody>
</table>

<script>
const datos = JSON.parse(localStorage.getItem("encuestas")) || [];

const tbody = document.querySelector("#tablaDatos tbody");

datos.forEach(d => {
  const fila = `
    <tr>
      <td>${d.inundada}</td>
      <td>${d.danificado}</td>
      <td>${d.direccion}</td>
      <td>${d.fecha}</td>
    </tr>
  `;

  tbody.innerHTML += fila;
});
</script>

</body>
</html>
