<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hydromed — Mapa de Alertas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></noscript>
  <link rel="stylesheet" href="hydro.css">

  <style>
    body { overflow: hidden; }

    /* Mapa ocupa toda la pantalla bajo el navbar */
    #map {
      position: fixed;
      top: 57px; left: 0; right: 0; bottom: 0;
      z-index: 1;
      background: #071828;
    }

    /* Filtro oscuro del mapa para combinar con el diseño */
    .leaflet-tile-pane { filter: brightness(0.68) saturate(0.5) hue-rotate(195deg); }

    /* Panel de estadísticas — esquina superior izquierda */
    .stats-panel {
      position: fixed;
      top: 68px; left: 12px;
      z-index: 500;
      display: flex; flex-direction: column; gap: 6px;
    }
    .stat-chip {
      background: rgba(4,17,31,0.88);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(56,189,248,0.14);
      border-radius: 10px;
      padding: 8px 13px;
      font-size: 12px;
      display: flex; align-items: center; gap: 8px;
      color: rgba(203,213,225,0.85);
    }
    .chip-num {
      font-family: 'Bebas Neue', cursive;
      font-size: 20px; line-height: 1;
    }
    .chip-sub { font-size: 10px; color: var(--text-faint); line-height: 1; }

    /* Leyenda — esquina inferior derecha */
    .legend {
      position: fixed;
      bottom: 20px; right: 12px;
      z-index: 500;
      background: rgba(4,17,31,0.9);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(56,189,248,0.15);
      border-radius: 14px;
      padding: 13px 17px;
      min-width: 185px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    }
    .legend-title {
      font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-faint); margin-bottom: 10px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 9px;
      font-size: 12px; color: rgba(203,213,225,0.8); margin-bottom: 7px;
    }
    .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .legend-sep { height: 1px; background: rgba(56,189,248,0.08); margin: 8px 0; }

    /* En móvil: leyenda más compacta */
    @media(max-width:480px){
      .legend { right: 8px; bottom: 14px; padding: 10px 13px; min-width: 160px; }
      .stats-panel { top: 64px; left: 8px; }
      .stat-chip { padding: 6px 10px; font-size: 11px; }
    }

    /* Popup de Leaflet personalizado */
    .leaflet-popup-content-wrapper {
      background: rgba(4,17,31,0.96)!important;
      border: 1px solid rgba(56,189,248,0.2)!important;
      border-radius: 12px!important;
      box-shadow: 0 8px 28px rgba(0,0,0,0.5)!important;
      color: white!important;
      font-family: 'DM Sans', sans-serif!important;
    }
    .leaflet-popup-tip { background: rgba(4,17,31,0.96)!important; }
    .leaflet-popup-close-button { color: rgba(148,163,184,0.5)!important; font-size: 16px!important; }

    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      animation: dp 2s ease-in-out infinite;
    }
    @keyframes dp { 0%,100%{opacity:1} 50%{opacity:0.45} }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="brand">
        <div class="brand-icon">🌊</div>
        <span class="brand-name">HYDROMED</span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link"><i class="fas fa-house" style="font-size:11px;margin-right:3px;"></i>Inicio</a></li>
        <li><a href="encuesta.html" class="nav-link">Encuesta</a></li>
        <li><a href="dashboard.html" class="btn-nav">📊 Estadísticas</a></li>
      </ul>
      <!-- BOTÓN VOLVER siempre visible -->
      <a href="index.html" class="btn-back">
        <i class="fas fa-arrow-left"></i> Volver
      </a>
    </div>
  </nav>

  <!-- MAPA -->
  <div id="map"></div>

  <!-- STATS PANEL -->
  <div class="stats-panel">
    <div class="stat-chip">
      <div class="live-dot" style="background:#4ade80;"></div>
      <span>Mapa en vivo</span>
    </div>
    <div class="stat-chip">
      <i class="fas fa-map-pin" style="color:#38bdf8;font-size:12px;"></i>
      <div><div class="chip-num" id="sc-total" style="color:#38bdf8;">0</div><div class="chip-sub">Reportes</div></div>
    </div>
    <div class="stat-chip">
      <i class="fas fa-triangle-exclamation" style="color:#ef4444;font-size:12px;"></i>
      <div><div class="chip-num" id="sc-criticos" style="color:#ef4444;">0</div><div class="chip-sub">Críticos</div></div>
    </div>
    <div class="stat-chip">
      <i class="fas fa-water" style="color:#fb923c;font-size:12px;"></i>
      <div><div class="chip-num" id="sc-alertas" style="color:#fb923c;">0</div><div class="chip-sub">Alertas</div></div>
    </div>
  </div>

  <!-- LEYENDA -->
  <div class="legend">
    <div class="legend-title"><i class="fas fa-circle-info" style="margin-right:4px;"></i>Leyenda</div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,0.5);"></div>
      Inundada + Damnificado
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#fb923c;box-shadow:0 0 6px rgba(251,146,60,0.5);"></div>
      Zona inundada
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,0.5);"></div>
      Sin afectación
    </div>
    <div class="legend-sep"></div>
    <div style="font-size:10px;color:var(--text-faint);">Fuente: reportes Hydromed</div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    try {
      /* Inicializar mapa centrado en Medellín */
      const map = L.map('map', { zoomControl: false }).setView([6.2442, -75.5812], 12);
      L.control.zoom({ position: 'bottomleft' }).addTo(map);

      /* Capa base OpenStreetMap */
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© Hydromed · OpenStreetMap'
      }).addTo(map);

      /* Datos desde localStorage — generados por encuesta.html */
      const encuestas = JSON.parse(localStorage.getItem("encuestas") || "[]");

      /* Coordenadas de todas las comunas y corregimientos */
      const coords = {
        "Popular":[6.2934,-75.5360],"Santa Cruz":[6.3008,-75.5410],
        "Manrique":[6.2663,-75.5480],"Aranjuez":[6.2769,-75.5550],
        "Castilla":[6.2920,-75.5650],"Doce de Octubre":[6.2830,-75.5750],
        "Robledo":[6.2760,-75.5850],"Villa Hermosa":[6.2400,-75.5550],
        "Buenos Aires":[6.2350,-75.5470],"La Candelaria":[6.2518,-75.5636],
        "Laureles":[6.2447,-75.5900],"La América":[6.2510,-75.6020],
        "San Javier":[6.2560,-75.6200],"El Poblado":[6.2100,-75.5670],
        "Guayabal":[6.2200,-75.5850],"Belén":[6.2300,-75.6000],
        "Altavista":[6.2050,-75.6200],"San Cristóbal":[6.2700,-75.6300],
        "San Antonio de Prado":[6.1800,-75.6500],
        "Santa Elena":[6.2300,-75.5100],"Palmitas":[6.3300,-75.7200],
      };

      let totalR=0, criticos=0, alertas=0;

      encuestas.forEach(e => {
        const c = coords[e.comuna];
        if (!c) return;
        totalR++;

        let color, label;
        if (e.inundada==='si' && e.danificado==='si') {
          color='#ef4444'; label='🔴 Crítico'; criticos++;
        } else if (e.inundada==='si') {
          color='#fb923c'; label='🟠 Alerta'; alertas++;
        } else {
          color='#4ade80'; label='🟢 Sin afectación';
        }

        /* Marcador principal */
        L.circleMarker(c, {
          radius:9, color, fillColor:color, fillOpacity:0.88, weight:2
        }).addTo(map)
          .bindPopup(`
            <div style="font-family:'DM Sans',sans-serif;padding:3px;">
              <div style="font-size:10px;color:rgba(148,163,184,0.6);letter-spacing:0.8px;margin-bottom:5px;">REPORTE CIUDADANO</div>
              <div style="font-size:15px;font-weight:600;color:white;margin-bottom:6px;">${e.comuna}</div>
              <div style="font-size:12px;color:rgba(203,213,225,0.8);">${label}</div>
              <div style="font-size:11px;color:rgba(148,163,184,0.5);margin-top:3px;">
                ${e.inundada==='si'?'🌊 Inundada':'✅ Despejada'} ·
                ${e.danificado==='si'?'⚠️ Damnificado/a':'Sin afectación directa'}
              </div>
              ${e.fecha?`<div style="font-size:10px;color:rgba(148,163,184,0.35);margin-top:4px;">${new Date(e.fecha).toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'})}</div>`:''}
            </div>
          `);

        /* Anillo exterior (glow visual) */
        L.circleMarker(c, {
          radius:15, color, fillColor:color, fillOpacity:0.07, weight:1, opacity:0.35
        }).addTo(map);
      });

      /* Actualizar chips */
      document.getElementById('sc-total').textContent   = totalR;
      document.getElementById('sc-criticos').textContent = criticos;
      document.getElementById('sc-alertas').textContent  = alertas;

      /* Si no hay reportes: mostrar control informativo */
      if (!encuestas.length) {
        const info = L.control({ position:'topright' });
        info.onAdd = () => {
          const d = L.DomUtil.create('div');
          d.style.cssText='background:rgba(4,17,31,0.9);border:1px solid rgba(56,189,248,0.18);border-radius:12px;padding:11px 15px;font-family:"DM Sans",sans-serif;color:rgba(148,163,184,0.8);font-size:12px;backdrop-filter:blur(12px);';
          d.innerHTML='<div style="color:#38bdf8;font-weight:600;margin-bottom:3px;">Sin reportes aún</div>Completa la encuesta para<br>ver datos en el mapa.<a href="encuesta.html" style="color:#38bdf8;font-size:11px;display:block;margin-top:6px;">Ir a encuesta →</a>';
          return d;
        };
        info.addTo(map);
      }

    } catch(err) { console.error('Error mapa:', err); }
  </script>
</body>
</html>
